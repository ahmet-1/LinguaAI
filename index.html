<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LinguaAI" />
  <meta name="description" content="AI Hoca ile 10 Dil Öğren - 5 Gün Ücretsiz" />
  <title>LinguaAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #4caf50, #1b5e20);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 900; color: white;
      margin: 0 auto 20px;
      box-shadow: 0 4px 24px rgba(76,175,80,0.4);
    }
    h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    h1 span { color: #4caf50; }
    p { color: #888; font-size: 15px; line-height: 1.6; max-width: 300px; margin: 0 auto 30px; }
    .btn {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white; border: none;
      padding: 16px 40px; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; width: 100%; max-width: 300px;
      box-shadow: 0 4px 20px rgba(76,175,80,0.4);
      margin-bottom: 12px;
    }
    .note {
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.2);
      border-radius: 12px;
      padding: 12px 20px;
      color: #4caf50;
      font-size: 12px;
      max-width: 300px;
      margin: 20px auto 0;
    }
    #app { width: 100%; max-width: 480px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="logo">L</div>
    <h1>Lingua<span>AI</span></h1>
    <p>AI Hoca ile 10 Dil Öğren<br/>5 Gün Ücretsiz Dene</p>
    <button class="btn" onclick="window.location.href='https://linguaai.vercel.app'">
      Uygulamayı Aç →
    </button>
    <div class="note">
      📱 Ana ekrana ekle → Uygulama gibi kullan
    </div>
  </div>
</body>
</html>
