/* ═══════════════════════════════════════════════
   AVATAR BİLEŞENİ
═══════════════════════════════════════════════ */
function Avatar({teacher,lang,size=64}){
  const initials=teacher.name.split(" ").slice(-2).map(w=>w[0]).join("");
  const fs=size>80?30:size>50?20:13;
  return(
    <div style={{width:size,height:size,borderRadius:"50%",
      background:`linear-gradient(135deg,${lang.color},${lang.color}cc)`,
      border:`${size>50?3:2}px solid ${lang.accent}`,
      display:"flex",alignItems:"center",justifyContent:"center",
      flexShrink:0,boxShadow:`0 4px 16px ${lang.accent}44`,position:"relative"}}>
      <span style={{fontSize:fs,fontWeight:900,color:"#fff",fontFamily:"serif"}}>{initials}</span>
      {teacher.kids&&size>50&&(
        <div style={{position:"absolute",top:-3,right:-3,width:18,height:18,
          borderRadius:"50%",background:C.gold,border:"2px solid "+C.bg,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:9,color:"#fff",fontWeight:700}}>★</div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function SessionScreen({langId,teacher,user,onClose}){
  const lang=LANGS.find(l=>l.id===langId);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [timeLeft,setTimeLeft]=useState(user?.plan==="Deneme"?1200:99999);
  const [micActive,setMicActive]=useState(false);
  const [voiceErr,setVoiceErr]=useState("");
  const [apiErr,setApiErr]=useState("");
  const endRef=useRef(null);
  const recRef=useRef(null);

  // Ders oturumu kaydet
  useEffect(()=>{
    const session={
      id:Date.now(),
      userId:user?.id,
      userName:user?.name,
      langId,langName:lang.name,
      teacherName:teacher.name,
      startTime:new Date().toLocaleString("tr-TR"),
      active:true
    };
    DB.set("active_session_"+user?.id,session);
    setMessages([{role:"assistant",
      text:`Merhaba ${user?.name?.split(" ")[0]||""}! Ben ${teacher.name}, ${teacher.origin} kökenli AI dil öğretmenin.\n\nUzmanlık: ${teacher.specialty}\n\nYazarak veya 🎤 butonuna basarak sesli konuşabilirsin. Başlayalım!`
    }]);
    if(user?.plan==="Deneme"){
      const t=setInterval(()=>setTimeLeft(s=>Math.max(0,s-1)),1000);
      return()=>{ clearInterval(t); DB.del("active_session_"+user?.id); };
    }
    return()=>{ DB.del("active_session_"+user?.id); };
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[messages]);

  const startMic=()=>{
    setVoiceErr("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setVoiceErr("Tarayıcınız ses girişini desteklemiyor. Yazarak devam edebilirsiniz.");return;}
    try{
      const r=new SR();
      r.lang=lang.langCode||"tr-TR";
      r.continuous=false;r.interimResults=false;
      r.onstart=()=>setMicActive(true);
      r.onresult=e=>{
        const t=e.results[0][0].transcript;
        setInput(t);setMicActive(false);
      };
      r.onerror=e=>{
        setMicActive(false);
        if(e.error==="not-allowed")setVoiceErr("Mikrofon izni reddedildi.");
        else setVoiceErr("Ses algılanamadı, tekrar dene.");
        setTimeout(()=>setVoiceErr(""),4000);
      };
      r.onend=()=>setMicActive(false);
      recRef.current=r;r.start();
    }catch{setVoiceErr("Mikrofon başlatılamadı.");}
  };
  const stopMic=()=>{try{recRef.current?.stop();}catch{}setMicActive(false);};

  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput("");setApiErr("");
    setMessages(m=>[...m,{role:"user",text:msg}]);
    setLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:800,
          system:`Sen ${teacher.name} adlı AI dil öğretmenisin. ${teacher.origin} kökenlisin. ${lang.name} dersi veriyorsun. Uzmanlık alanın: ${teacher.specialty}. Türkçe yanıt ver ve ${lang.native} dilinde örnekler ekle. Sıcak, sabırlı ve motive edici ol. Hataları nazikçe düzelt. Maksimum 3 paragraf.`,
          messages:[
            ...messages.filter(m=>m.role).map(m=>({role:m.role,content:m.text})),
            {role:"user",content:msg}
          ]
        })
      });
      if(!r.ok){
        const err=await r.json().catch(()=>({}));
        throw new Error(err?.error?.message||"API hatası: "+r.status);
      }
      const d=await r.json();
      const reply=d.content?.[0]?.text;
      if(!reply)throw new Error("Boş yanıt alındı.");
      setMessages(m=>[...m,{role:"assistant",text:reply}]);
      if(window.speechSynthesis){
        window.speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(reply.substring(0,150));
        u.lang=lang.langCode||"tr-TR";u.rate=0.9;
        window.speechSynthesis.speak(u);
      }
    }catch(e){
      setApiErr("Bağlantı hatası: "+e.message);
      setMessages(m=>[...m,{role:"assistant",
        text:"Üzgünüm, şu an yanıt veremiyorum. İnternet bağlantınızı kontrol edip tekrar deneyin."}]);
    }
    setLoading(false);
  };

  const mm=String(Math.floor(timeLeft/60)).padStart(2,"0");
  const ss=String(timeLeft%60).padStart(2,"0");

  return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",zIndex:1000}}>
      <style>{`@keyframes dotB{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}`}</style>

      {/* Güvenlik bandı */}

      </div>

      {/* Başlık */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",
        background:`linear-gradient(135deg,${lang.color}ee,${lang.color}99)`,
        borderBottom:`2px solid ${lang.accent}`}}>
        <Avatar teacher={teacher} lang={lang} size={44}/>
        <div style={{flex:1}}>
          <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{teacher.name}</div>
          <div style={{color:lang.accent,fontSize:11}}>{teacher.origin} • {teacher.specialty}</div>
        </div>
        {user?.plan==="Deneme"&&(
          <div style={{background:"rgba(0,0,0,0.35)",borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#aaa"}}>KALAN</div>
            <div style={{fontWeight:800,color:timeLeft<300?C.dangerLight:lang.accent,fontSize:16}}>{mm}:{ss}</div>
          </div>
        )}
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:7,padding:"7px 12px",cursor:"pointer",fontWeight:600}}>✕</button>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sol panel */}
        <div style={{width:200,background:C.bg2,borderRight:`1px solid ${C.border}`,padding:12,display:"flex",flexDirection:"column",gap:10,overflowY:"auto"}}>
          {/* Hoca */}
          <div style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.border2}`,textAlign:"center"}}>
            <div style={{fontSize:9,color:C.text3,marginBottom:8,fontWeight:700,letterSpacing:1}}>AI HOCAN</div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>
              <Avatar teacher={teacher} lang={lang} size={76}/>
            </div>
            <div style={{color:C.text,fontWeight:700,fontSize:13}}>{teacher.name}</div>
            <div style={{color:lang.accent,fontSize:10,marginTop:3}}>{teacher.origin}</div>
            <div style={{color:C.text3,fontSize:10,marginTop:3}}>{teacher.specialty}</div>
            <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:8}}>
              <span style={{color:lang.accent,fontSize:12}}>⭐ {teacher.rating}</span>
              <span style={{color:C.text3,fontSize:11}}>{teacher.students.toLocaleString()}</span>
            </div>
            {loading&&<div style={{marginTop:6,color:C.greenLight,fontSize:10,animation:"pulse 1s infinite"}}>Yanıt yazıyor...</div>}
          </div>

          {/* Kamera — Yakında */}
          <div style={{background:C.card,borderRadius:10,padding:12,border:`1px solid ${C.border}`,textAlign:"center"}}>
            <div style={{fontSize:9,color:C.text3,marginBottom:6,fontWeight:700,letterSpacing:1}}>KAMERA</div>
            <div style={{background:C.bg3,borderRadius:8,padding:"12px 10px"}}>
              <div style={{fontSize:22,marginBottom:4}}>📷</div>
              <div style={{color:C.warn,fontSize:11,fontWeight:700}}>Yakında!</div>
              <div style={{color:C.text3,fontSize:10,marginTop:3}}>Güncellemeyle gelecek</div>
            </div>
          </div>

          {/* Ses hatası */}
          {voiceErr&&<div style={{background:"rgba(198,40,40,0.12)",borderRadius:8,padding:"8px 10px",color:C.dangerLight,fontSize:11,border:`1px solid ${C.danger}44`}}>{voiceErr}</div>}
          {apiErr&&<div style={{background:"rgba(198,40,40,0.12)",borderRadius:8,padding:"8px 10px",color:C.dangerLight,fontSize:11,border:`1px solid ${C.danger}44`}}>{apiErr}</div>}

          {/* Modüller */}
          <div style={{background:C.card,borderRadius:10,padding:12}}>
            <div style={{fontSize:9,color:C.text3,marginBottom:8,fontWeight:700,letterSpacing:1}}>MODÜLLER</div>
            {lang.modules.map(m=>(
              <div key={m} style={{padding:"6px 10px",borderRadius:7,marginBottom:4,background:C.bg3,color:C.text2,fontSize:11,borderLeft:`3px solid ${lang.accent}55`}}>{m}</div>
            ))}
          </div>
        </div>

        {/* Sohbet */}
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
            {messages.map((msg,i)=>(
              <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-start"}}>
                {msg.role==="assistant"&&<Avatar teacher={teacher} lang={lang} size={32}/>}
                <div style={{maxWidth:"70%",padding:"11px 14px",borderRadius:16,
                  background:msg.role==="user"?`linear-gradient(135deg,${C.green},${C.green2})`:C.card,
                  color:C.text,fontSize:13,lineHeight:1.7,
                  borderBottomRightRadius:msg.role==="user"?4:16,
                  borderBottomLeftRadius:msg.role==="assistant"?4:16,
                  border:msg.role==="assistant"?`1px solid ${C.border}`:"none",
                  whiteSpace:"pre-wrap"}}>
                  {msg.text}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <Avatar teacher={teacher} lang={lang} size={32}/>
                <div style={{background:C.card,borderRadius:16,padding:"10px 16px",border:`1px solid ${C.border}`,display:"flex",gap:4,alignItems:"center"}}>
                  {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.greenLight,animation:`dotB 1s ${i*0.18}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          {/* Input */}
          <div style={{padding:12,borderTop:`1px solid ${C.border}`,background:C.bg2}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button
                onMouseDown={startMic} onMouseUp={stopMic}
                onTouchStart={(e)=>{e.preventDefault();startMic();}}
                onTouchEnd={(e)=>{e.preventDefault();stopMic();}}
                style={{width:44,height:44,borderRadius:"50%",
                  background:micActive?"rgba(198,40,40,0.2)":C.bg3,
                  border:`2px solid ${micActive?C.dangerLight:C.green}`,
                  cursor:"pointer",fontSize:18,flexShrink:0,
                  animation:micActive?"pulse 0.5s infinite":"none",
                  userSelect:"none",WebkitUserSelect:"none"}}>
                {micActive?"🔴":"🎤"}
              </button>
              <input value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}
                placeholder="Mesaj yaz veya 🎤 bas konuş..."
                style={{flex:1,background:C.bg3,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 14px",color:C.text,fontSize:13,outline:"none"}}/>
              <button onClick={send} disabled={loading||!input.trim()}
                style={{padding:"11px 18px",borderRadius:10,
                  background:loading||!input.trim()?C.bg3:`linear-gradient(135deg,${C.green},${C.green2})`,
                  color:loading||!input.trim()?C.text3:"#fff",
                  border:"none",cursor:loading||!input.trim()?"not-allowed":"pointer",
                  fontWeight:700,fontSize:15,flexShrink:0}}>➤</button>
            </div>
            <div style={{textAlign:"center",color:C.text3,fontSize:10,marginTop:5}}>
              Mikrofona bas ve konuş — bırakınca gönderir
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

   ADMİN PANELİ

function AdminPanel({onClose}){
  const [tab,setTab]=useState("dashboard");
  const [cfg,setCfg]=useState(getAdminCfg());
  const [saved,setSaved]=useState(false);
  const [giftEmail,setGiftEmail]=useState("");
  const [giftType,setGiftType]=useState("1 Ay Ücretsiz");
  const [giftDone,setGiftDone]=useState(false);
  const [giftErr,setGiftErr]=useState("");
  const [newPass,setNewPass]=useState("");
  const [newPass2,setNewPass2]=useState("");
  const [passMsg,setPassMsg]=useState("");
  const [watchTarget,setWatchTarget]=useState(null);

  const save=(u)=>{setCfg(u);saveAdminCfg(u);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const totalUsers=cfg.users?.length||0;
  const activeUsers=cfg.users?.filter(u=>u.status==="Aktif").length||0;
  const trialUsers=cfg.users?.filter(u=>u.status==="Deneme").length||0;
  const totalRev=(cfg.users||[]).reduce((s,u)=>{const n=parseInt((u.paid||"0").replace(/[^0-9]/g,""));return s+(isNaN(n)?0:n);},0);
  const pendingCount=(cfg.pendingPayments||[]).filter(p=>p.status==="waiting").length;

  const approvePay=(id)=>{
    const p=(cfg.pendingPayments||[]).find(x=>x.id===id);
    const updated={
      ...cfg,
      pendingPayments:(cfg.pendingPayments||[]).map(x=>x.id===id?{...x,status:"approved"}:x),
      users:(cfg.users||[]).map(u=>u.email===p?.email?{...u,plan:"Aylık",status:"Aktif",paid:`₺${parseInt((u.paid||"0").replace(/[^0-9]/g,""))+(p?.amountRaw||299)}`}:u)
    };
    save(updated);
  };

  const sendGift=()=>{
    setGiftErr("");
    if(!giftEmail.includes("@")){setGiftErr("Geçerli e-posta girin");return;}
    const users=cfg.users||[];
    const found=users.find(u=>u.email===giftEmail);
    if(!found){setGiftErr("Bu e-posta kayıtlı kullanıcılarda yok");return;}
    save({...cfg,users:users.map(u=>u.email===giftEmail?{...u,plan:giftType,status:"Aktif",giftUsed:true}:u)});
    setGiftDone(true);
  };

  const changePass=()=>{
    if(newPass.length<6){setPassMsg("En az 6 karakter");return;}
    if(newPass!==newPass2){setPassMsg("Şifreler eşleşmiyor");return;}
    save({...cfg,adminPassword:newPass});
    setPassMsg("✅ Şifre güncellendi!");
    setNewPass("");setNewPass2("");
  };

  const inp={width:"100%",padding:"10px 12px",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12};
  const card={background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,marginBottom:14};
  const btnG={padding:"10px 20px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13,border:"none",background:`linear-gradient(135deg,${C.green},${C.green2})`,color:"#fff"};

  const TABS=[["dashboard","📊","Dashboard"],["users","👥","Kullanıcılar"],["payments","💳","Ödemeler"],["sessions","📡","Aktif Dersler"],["gift","🎁","Hediye Ver"],["notify","🔔","Bildirimler"],["settings","⚙️","Ayarlar"]];

  return(
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:2000,display:"flex"}}>
      {/* Sidebar */}
      <div style={{width:210,background:C.bg2,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:14,gap:3}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,paddingBottom:14,borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.green3},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:16}}>L</div>
          <div><span style={{fontWeight:900,color:C.text,fontSize:15}}>Lingua</span><span style={{fontWeight:900,color:C.greenLight,fontSize:15}}>AI</span></div>
        </div>
        <div style={{fontSize:9,color:C.text3,marginBottom:5,paddingLeft:3,letterSpacing:1,fontWeight:700}}>YÖNETİCİ PANELİ</div>
        {TABS.map(([id,ic,lb])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{display:"flex",alignItems:"center",gap:8,padding:"10px 11px",borderRadius:9,border:"none",
              background:tab===id?`rgba(46,125,50,0.2)`:"transparent",
              color:tab===id?C.greenLight:C.text3,cursor:"pointer",fontSize:12,textAlign:"left",
              fontWeight:tab===id?700:400,borderLeft:tab===id?`3px solid ${C.green3}`:"3px solid transparent"}}>
            {ic} {lb}

        <div style={{flex:1}}/>
        <button onClick={onClose} style={{padding:"9px 11px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.text3,cursor:"pointer",fontSize:11}}>← Uygulamaya Dön</button>

            {cfg.iban&&<div style={{...card}}><div style={{color:C.text2,fontWeight:700,marginBottom:10}}>Aktif IBAN</div><div style={{color:C.text3,fontSize:13,lineHeight:2.2}}>{cfg.accountName}<br/><strong style={{color:C.greenLight,fontFamily:"monospace",fontSize:14}}>{cfg.iban}</strong><br/>{cfg.bankName}</div></div>}
            <div style={{color:C.text,fontWeight:700,marginBottom:12,fontSize:14}}>Bekleyen Ödemeler ({pendingCount})</div>
            {(cfg.pendingPayments||[]).filter(p=>p.status==="waiting").length===0?(

function App(){
  // Kalıcı oturumlar
  const [user,setUser]=useState(()=>DB.get("current_user"));
  const [isAdmin,setIsAdmin]=useState(()=>DB.get("admin_session")===true);
  const [screen,setScreen]=useState("home");
  const [selLang,setSelLang]=useState(null);
  const [kidsMode,setKidsMode]=useState(false);
  const [activeSession,setActiveSession]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);

  // Modal: "login"|"register"|"admin_login"|"forgot"
  const [modal,setModal]=useState(null);
  const [payPlan,setPayPlan]=useState(null);

  // Giriş formu
  const [loginForm,setLoginForm]=useState({email:"",password:""});
  const [loginErr,setLoginErr]=useState("");

  // Kayıt formu
  const [regForm,setRegForm]=useState({name:"",email:"",phone:"",tc:"",birthdate:"",city:"",password:"",confirm:"",consent:false});
  const [regErrors,setRegErrors]=useState({});
  const [regDone,setRegDone]=useState(false);

  // Admin giriş
  const [adminPass,setAdminPass]=useState("");
  const [adminErr,setAdminErr]=useState("");

  // Şifremi unuttum
  const [forgotEmail,setForgotEmail]=useState("");
  const [forgotDone,setForgotDone]=useState(false);

  const loginUser=(u)=>{setUser(u);DB.set("current_user",u);};
  const logoutUser=()=>{setUser(null);DB.del("current_user");setScreen("home");};
  const loginAdmin=()=>{setIsAdmin(true);DB.set("admin_session",true);setShowAdmin(true);setModal(null);setAdminPass("");};
  const logoutAdmin=()=>{setIsAdmin(false);DB.del("admin_session");setShowAdmin(false);};

  const doLogin=()=>{
    if(!loginForm.email||!loginForm.password){setLoginErr("Tüm alanları doldurun.");return;}
    const adm=getAdminCfg();
    const users=adm.users||[];
    const found=users.find(u=>u.email.toLowerCase()===loginForm.email.toLowerCase()&&u.password===loginForm.password);
    if(found){
      // Güncel veriyi DB'den al
      const fresh=getAdminCfg().users.find(u=>u.id===found.id)||found;
      loginUser(fresh);
      setModal(null);setLoginErr("");setLoginForm({email:"",password:""});
    }else{
      setLoginErr("E-posta veya şifre hatalı.");
    }
  };

  const validateReg=()=>{
    const e={};
    if(!regForm.name.trim())e.name="Zorunlu";
    if(!regForm.email.includes("@"))e.email="Geçerli e-posta girin";
    if(!regForm.phone.trim())e.phone="Zorunlu";
    if(regForm.tc.length!==11||!/^\d+$/.test(regForm.tc))e.tc="11 haneli TC kimlik numarası";
    if(!regForm.birthdate)e.birthdate="Zorunlu";
    if(!regForm.city.trim())e.city="Zorunlu";
    if(regForm.password.length<6)e.password="En az 6 karakter";
    if(regForm.password!==regForm.confirm)e.confirm="Şifreler eşleşmiyor";
    if(!regForm.consent)e.consent="Onay zorunlu";
    setRegErrors(e);
    return Object.keys(e).length===0;
  };

  const doRegister=()=>{
    if(!validateReg())return;
    const adm=getAdminCfg();
    const exists=(adm.users||[]).find(u=>u.email.toLowerCase()===regForm.email.toLowerCase());
    if(exists){setRegErrors(e=>({...e,email:"Bu e-posta zaten kayıtlı"}));return;}
    const newUser={
      id:Date.now(),name:regForm.name,email:regForm.email,
      phone:regForm.phone,tc:regForm.tc,birthdate:regForm.birthdate,city:regForm.city,
      password:regForm.password,plan:"Deneme",status:"Deneme",lang:"—",
      joined:new Date().toLocaleDateString("tr-TR"),paid:"₺0",
      sessions:0,trialDays:5,giftUsed:false,trialStart:Date.now()
    };
    saveAdminCfg({...adm,users:[...(adm.users||[]),newUser]});
    loginUser(newUser);
    setRegDone(true);
  };

  const tryAdmin=()=>{
    const adm=getAdminCfg();
    if(adminPass===adm.adminPassword){loginAdmin();}
    else{setAdminErr("Yanlış şifre");}
  };

  const nav=(s)=>{setScreen(s);setSelLang(null);};

  const canLesson=()=>{
    if(!user)return false;
    if(isAdmin)return true;
    if(user.status==="Aktif")return true;
    if(user.status==="Deneme"){
      const days=(Date.now()-user.trialStart)/(1000*60*60*24);
      return days<5;
    }
    return false;
  };

  
  if(showAdmin||isAdmin)return <AdminPanel onClose={()=>{setShowAdmin(false);setIsAdmin(false);DB.del("admin_session");}}/>

              <button onClick={tryAdmin} style={{flex:1,padding:10,background:`linear-gradient(135deg,${C.green},${C.green2})`,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700}}>Giriş</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
